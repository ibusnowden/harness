name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "./dist/ascaris" ./cmd/ascaris

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p release
          cp ./dist/ascaris ./release/ascaris
          chmod +x ./release/ascaris
          tar -C release -czf "./dist/ascaris-${{ matrix.target }}.tar.gz" ascaris

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ascaris-${{ matrix.target }}
          path: ./dist/ascaris-${{ matrix.target }}.tar.gz

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/ascaris-${{ matrix.target }}.tar.gz
          fail_on_unmatched_files: true

services:
  qwen3.6-30b-a3b:
    image: vllm/vllm-openai:latest
    profiles: [qwen]
    runtime: nvidia
    ipc: host
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - "${HF_HOME:-/project/inniang/hf-cache}:/root/.cache/huggingface"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command: >
      --model Qwen/Qwen3.6-35B-A3B
      --served-model-name qwen3.6-30b-a3b
      --tensor-parallel-size 1
      --max-model-len 16384
      --enable-auto-tool-choice
      --tool-call-parser qwen3_xml
      --reasoning-parser qwen3
      --host 0.0.0.0
      --port 8000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  glm-4.7-flash:
    image: vllm/vllm-openai:latest
    profiles: [glm]
    runtime: nvidia
    ipc: host
    ports:
      - "127.0.0.1:8001:8001"
    volumes:
      - "${HF_HOME:-/scratch/hf-cache}:/root/.cache/huggingface"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command: >
      --model zai-org/GLM-4.7-Flash
      --served-model-name glm-4.7-flash
      --tensor-parallel-size 1
      --max-model-len 32768
      --enable-auto-tool-choice
      --tool-call-parser glm47
      --reasoning-parser glm45
      --host 0.0.0.0
      --port 8001
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
